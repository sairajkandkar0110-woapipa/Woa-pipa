name: Build Modded TWRP (pipa) with WOA tools & Decryption

on:
  workflow_dispatch:
    inputs:
      stock_rom_link:
        description: 'Direct link to Stock ROM ZIP (Leave blank to auto-fetch latest)'
        required: false
        default: ''
      device_codename:
        description: 'Device codename'
        required: true
        default: 'pipa'
      device_vendor:
        description: 'Device vendor'
        required: true
        default: 'xiaomi'
      twrp_branch:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build-twrp:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Aggressive extra cleanup
        run: |
          echo "Before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo apt-get clean
          docker system prune -af --volumes 2>/dev/null || true

          echo "After cleanup:"
          df -h

      - name: Checkout this repo (WOA tools + scripts)
        uses: actions/checkout@v4
        with:
          path: woa-tools

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip wget curl unzip aria2 \
            openjdk-8-jdk bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev erofs-utils
          pip3 install twrpdtgen
          sudo apt-get clean

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Download Stock ROM & Extract Partition Payloads
        run: |
          ROM_LINK="${{ github.event.inputs.stock_rom_link }}"
          
          # Strip accidental leading/trailing spaces from manual input
          ROM_LINK=$(echo "$ROM_LINK" | tr -d '[:space:]')
          
          # Auto-fetch if input box was left empty
          if [ -z "$ROM_LINK" ]; then
            echo "No manual link provided. Auto-fetching the latest Recovery ROM for pipa..."
            ROM_LINK=$(python3 -c "
          import urllib.request, json
          try:
              req = urllib.request.Request('https://raw.githubusercontent.com/XiaomiFirmwareUpdater/miui-updates-tracker/master/data/latest.json')
              data = json.loads(urllib.request.urlopen(req).read().decode())
              
              # First try India Recovery ROM
              for rom in data:
                  if 'pipa' in rom['device'] and 'India' in rom['device'] and rom['link'].endswith('.zip'):
                      print(rom['link'].strip())
                      exit(0)
                      
              # Fallback to Global Recovery ROM
              for rom in data:
                  if 'pipa' in rom['device'] and 'Global' in rom['device'] and rom['link'].endswith('.zip'):
                      print(rom['link'].strip())
                      exit(0)
          except Exception as e:
              pass
          ")
          fi
          
          if [ -z "$ROM_LINK" ]; then
            echo "Failed to auto-fetch ROM link. Please provide one manually in the workflow inputs."
            exit 1
          fi
          
          echo "Downloading Stock ROM from: $ROM_LINK"
          aria2c -x 16 -s 16 -j 16 -k 5M -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -d . -o stock_rom.zip "$ROM_LINK"
          
          echo "Extracting payload.bin from ROM zip..."
          unzip -j stock_rom.zip payload.bin -d extraction/
          
          echo "Downloading payload-dumper-go..."
          wget -q -O payload-dumper.tar.gz https://github.com/ssut/payload-dumper-go/releases/download/1.2.2/payload-dumper-go_1.2.2_linux_amd64.tar.gz
          tar -xf payload-dumper.tar.gz
          
          echo "Dumping boot.img and vendor.img from payload.bin..."
          ./payload-dumper-go -p boot,vendor extraction/payload.bin
          
          BOOT_PATH=$(find extracted_* -name "boot.img" | head -n 1)
          cp "$BOOT_PATH" ./extracted_boot.img
          
          echo "Verifying dumped boot image:"
          file extracted_boot.img

      - name: Generate device tree with twrpdtgen from Stock boot.img
        run: |
          python3 -m twrpdtgen extracted_boot.img -o device_tree_output
          find device_tree_output -maxdepth 4 -type f

      - name: Init TWRP minimal manifest (Shallow Sync)
        run: |
          mkdir -p twrp_build
          cd twrp_build
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ github.event.inputs.twrp_branch }} --depth=1
          repo sync -c -j8 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: Clean up repo sync leftovers
        run: |
          df -h
          find twrp_build -name "*.git" -type d -prune -exec du -sh {} \; 2>/dev/null | sort -rh | head -20 || true

      - name: Place generated device tree & Configure Installer
        run: |
          DT_PATH="twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}"
          mkdir -p "$DT_PATH"
          
          # Find the exact folder containing AndroidProducts.mk to prevent double-nesting
          GEN_DT_DIR=$(find device_tree_output -name "AndroidProducts.mk" -exec dirname {} \;)
          if [ -n "$GEN_DT_DIR" ]; then
              cp -r "$GEN_DT_DIR"/* "$DT_PATH"/
          else
              cp -r device_tree_output/* "$DT_PATH"/ 2>/dev/null || true
          fi
          
          # Safely neuter obsolete boot control HAL flag generated by twrpdtgen by renaming it to a dummy variable
          echo "Renaming obsolete PRODUCT_STATIC_BOOT_CONTROL_HAL in device tree..."
          sed -i 's/PRODUCT_STATIC_BOOT_CONTROL_HAL/OBSOLETE_BOOT_CONTROL_HAL/g' "$DT_PATH/device.mk" 2>/dev/null || true
          sed -i 's/PRODUCT_STATIC_BOOT_CONTROL_HAL/OBSOLETE_BOOT_CONTROL_HAL/g' "$DT_PATH/BoardConfig.mk" 2>/dev/null || true
          
          # Alias omni_ to twrp_ so lunch twrp_pipa-eng succeeds
          if [ -f "$DT_PATH/omni_${{ github.event.inputs.device_codename }}.mk" ]; then
              cp "$DT_PATH/omni_${{ github.event.inputs.device_codename }}.mk" "$DT_PATH/twrp_${{ github.event.inputs.device_codename }}.mk"
              sed -i 's/omni_/twrp_/g' "$DT_PATH/twrp_${{ github.event.inputs.device_codename }}.mk"
              sed -i 's/omni_/twrp_/g' "$DT_PATH/AndroidProducts.mk"
          fi

          echo "PRODUCT_PACKAGES += twrp_installer" >> "$DT_PATH/twrp_${{ github.event.inputs.device_codename }}.mk" 2>/dev/null || true
          echo "PRODUCT_PACKAGES += twrp_installer" >> "$DT_PATH/omni_${{ github.event.inputs.device_codename }}.mk" 2>/dev/null || true
          
          ls -la "$DT_PATH"

      - name: Extract Decryption Blobs from Stock vendor.img
        run: |
          echo "Mounting EROFS vendor image directly..."
          mkdir -p extracted_vendor
          VENDOR_IMG=$(find extracted_* -name "vendor.img" | head -n 1)
          
          sudo mount -t erofs -o loop "$VENDOR_IMG" extracted_vendor/
          
          DT_PATH="twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}"
          mkdir -p "$DT_PATH/recovery/root/vendor/lib64/hw"
          mkdir -p "$DT_PATH/recovery/root/vendor/bin/hw"
          
          sudo cp -rf extracted_vendor/lib64/hw/android.hardware.gatekeeper* "$DT_PATH/recovery/root/vendor/lib64/hw/" 2>/dev/null || true
          sudo cp -rf extracted_vendor/lib64/hw/android.hardware.keymaster* "$DT_PATH/recovery/root/vendor/lib64/hw/" 2>/dev/null || true
          
          sudo chown -R $USER:$USER "$DT_PATH/recovery/root/"
          sudo umount extracted_vendor/
          
          echo "BOARD_USES_QCOM_FBE_DECRYPTION := true" >> "$DT_PATH/BoardConfig.mk"
          echo "BOARD_USES_METADATA_PARTITION := true" >> "$DT_PATH/BoardConfig.mk"

      - name: Inject WOA binaries and trigger scripts into recovery root
        run: |
          DT_PATH="twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}"
          SBIN_PATH="$DT_PATH/recovery/root/sbin"
          mkdir -p "$SBIN_PATH"

          cp woa-tools/parted "$SBIN_PATH/parted" 2>/dev/null || true
          cp woa-tools/mkfs.fat "$SBIN_PATH/mkfs.fat" 2>/dev/null || true
          cp woa-tools/mkfs.ntfs "$SBIN_PATH/mkfs.ntfs" 2>/dev/null || true

          cp woa-tools/PARTITION "$SBIN_PATH/partition" 2>/dev/null || true
          cp woa-tools/RESTORE "$SBIN_PATH/restore" 2>/dev/null || true

          chmod 755 "$SBIN_PATH/parted" "$SBIN_PATH/mkfs.fat" "$SBIN_PATH/mkfs.ntfs" \
                    "$SBIN_PATH/partition" "$SBIN_PATH/restore" 2>/dev/null || true

          ls -la "$SBIN_PATH"

      - name: Verify BoardConfig references recovery root
        run: |
          DT_PATH="twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}"
          BOARDCONFIG="$DT_PATH/BoardConfig.mk"
          grep -n "RECOVERY_ROOT\|TARGET_COPY_OUT" "$BOARDCONFIG" || true

      - name: Build TWRP boot image & flashable installer
        run: |
          cd twrp_build
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M 5G
          lunch twrp_${{ github.event.inputs.device_codename }}-eng
          mka bootimage -j$(nproc --all)
          
          echo "Building Flashable ZIP target explicitly..."
          mka twrp_installer -j$(nproc --all) || true

      - name: Free space after build (pre-upload)
        if: always()
        run: df -h

      - name: Locate build output
        id: find_output
        run: |
          OUT_IMG=$(find twrp_build/out/target/product/${{ github.event.inputs.device_codename }} -maxdepth 1 -iname "boot.img" | head -n1)
          OUT_ZIP=$(find twrp_build/out/target/product/${{ github.event.inputs.device_codename }} -maxdepth 1 -iname "*twrp*.zip" | head -n1)
          echo "img_path=$OUT_IMG" >> "$GITHUB_OUTPUT"
          echo "zip_path=$OUT_ZIP" >> "$GITHUB_OUTPUT"
          echo "Found IMG: $OUT_IMG"
          echo "Found ZIP: $OUT_ZIP"

      - name: Upload Boot Image
        uses: actions/upload-artifact@v4
        if: steps.find_output.outputs.img_path != ''
        with:
          name: TWRP-${{ github.event.inputs.device_codename }}-boot-modded-WOA
          path: ${{ steps.find_output.outputs.img_path }}
          retention-days: 14

      - name: Upload Flashable ZIP Installer
        uses: actions/upload-artifact@v4
        if: steps.find_output.outputs.zip_path != ''
        with:
          name: TWRP-${{ github.event.inputs.device_codename }}-Flashable-Installer-WOA
          path: ${{ steps.find_output.outputs.zip_path }}
          retention-days: 14

      - name: Upload generated device tree too
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.device_codename }}-device-tree
          path: twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}
          retention-days: 14
          
