name: Build Modded TWRP (pipa) with WOA tools & Decryption

on:
  workflow_dispatch:
    inputs:
      boot_img_link:
        description: 'Direct/Pixeldrain link to boot.img'
        required: true
        default: 'https://pixeldrain.com/u/CHANGE_ME'
      stock_rom_link:
        description: 'Direct link to Stock Recovery ROM ZIP (for Decryption Blobs)'
        required: false
        default: ''
      device_codename:
        description: 'Device codename'
        required: true
        default: 'pipa'
      device_vendor:
        description: 'Device vendor'
        required: true
        default: 'xiaomi'
      twrp_branch:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build-twrp:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo (WOA tools + scripts)
        uses: actions/checkout@v4
        with:
          path: woa-tools

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip wget curl unzip \
            openjdk-8-jdk bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev erofs-utils
          pip3 install twrpdtgen
          sudo apt-get clean

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Download boot.img
        run: |
          LINK="${{ github.event.inputs.boot_img_link }}"
          if [[ "$LINK" == *"pixeldrain.com/u/"* ]]; then
            FILE_ID="${LINK##*/u/}"
            LINK="https://pixeldrain.com/api/file/${FILE_ID}"
          fi
          wget -O boot.img "$LINK"
          file boot.img

      - name: Generate device tree with twrpdtgen
        run: |
          python3 -m twrpdtgen boot.img -o device_tree_output
          find device_tree_output -maxdepth 4 -type f

      - name: Init TWRP minimal manifest
        run: |
          mkdir -p twrp_build
          cd twrp_build
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ github.event.inputs.twrp_branch }}
          repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Place generated device tree
        run: |
          DT_PATH="twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}"
          mkdir -p "$DT_PATH"
          cp -r device_tree_output/*/. "$DT_PATH"/ 2>/dev/null || cp -r device_tree_output/. "$DT_PATH"/
          
      - name: Extract Decryption Blobs from Stock ROM (If Provided)
        if: github.event.inputs.stock_rom_link != ''
        run: |
          echo "Downloading Stock ROM for blob extraction..."
          wget -q -O stock_rom.zip "${{ github.event.inputs.stock_rom_link }}"
          unzip -j stock_rom.zip payload.bin -d extraction/
          
          echo "Downloading payload-dumper-go..."
          wget -q -O payload-dumper.tar.gz https://github.com/ssut/payload-dumper-go/releases/download/1.2.2/payload-dumper-go_1.2.2_linux_amd64.tar.gz
          tar -xf payload-dumper.tar.gz
          
          echo "Dumping vendor.img..."
          ./payload-dumper-go -p vendor extraction/payload.bin
          
          echo "Extracting EROFS vendor image..."
          mkdir -p extracted_vendor
          VENDOR_IMG=$(find extracted_* -name "vendor.img" | head -n 1)
          fsck.erofs --extract=extracted_vendor "$VENDOR_IMG"
          
          echo "Copying keymaster and gatekeeper to device tree..."
          DT_PATH="twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}"
          mkdir -p "$DT_PATH/recovery/root/vendor/lib64/hw"
          mkdir -p "$DT_PATH/recovery/root/vendor/bin/hw"
          
          cp -rf extracted_vendor/lib64/hw/android.hardware.gatekeeper* "$DT_PATH/recovery/root/vendor/lib64/hw/" 2>/dev/null || true
          cp -rf extracted_vendor/lib64/hw/android.hardware.keymaster* "$DT_PATH/recovery/root/vendor/lib64/hw/" 2>/dev/null || true
          
          echo "Adding Crypto flags to BoardConfig.mk..."
          echo "BOARD_USES_QCOM_FBE_DECRYPTION := true" >> "$DT_PATH/BoardConfig.mk"
          echo "BOARD_USES_METADATA_PARTITION := true" >> "$DT_PATH/BoardConfig.mk"

      - name: Inject WOA binaries and trigger scripts into recovery root
        run: |
          DT_PATH="twrp_build/device/${{ github.event.inputs.device_vendor }}/${{ github.event.inputs.device_codename }}"
          SBIN_PATH="$DT_PATH/recovery/root/sbin"
          mkdir -p "$SBIN_PATH"

          cp woa-tools/parted "$SBIN_PATH/parted"
          cp woa-tools/mkfs.fat "$SBIN_PATH/mkfs.fat"
          cp woa-tools/mkfs.ntfs "$SBIN_PATH/mkfs.ntfs"
          cp woa-tools/PARTITION "$SBIN_PATH/partition"
          cp woa-tools/RESTORE "$SBIN_PATH/restore"

          chmod 755 "$SBIN_PATH/parted" "$SBIN_PATH/mkfs.fat" "$SBIN_PATH/mkfs.ntfs" "$SBIN_PATH/partition" "$SBIN_PATH/restore"

      - name: Build TWRP recovery image
        run: |
          cd twrp_build
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M 5G
          lunch twrp_${{ github.event.inputs.device_codename }}-eng
          mka recoveryimage -j$(nproc --all)

      - name: Locate build output
        id: find_output
        run: |
          OUT=$(find twrp_build/out/target/product/${{ github.event.inputs.device_codename }} -maxdepth 1 -iname "*recovery*.img" | head -n1)
          echo "recovery_path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload recovery image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-${{ github.event.inputs.device_codename }}-modded-WOA
          path: ${{ steps.find_output.outputs.recovery_path }}
          retention-days: 14
