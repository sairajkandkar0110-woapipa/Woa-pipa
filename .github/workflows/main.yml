name: Build Custom Recovery for Xiaomi Pad 6 (pipa)

on:
  workflow_dispatch:
    inputs:
      boot_link:
        description: 'Pixeldrain Direct Link for boot.img'
        required: true
        type: string
      vendor_boot_link:
        description: 'Pixeldrain Direct Link for vendor_boot.img'
        required: true
        type: string
      dtbo_link:
        description: 'Pixeldrain Direct Link for dtbo.img'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository & Custom Files
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update && sudo apt-get install -y \
            git python3 gperf build-essential zip curl zlib1g-dev libx11-dev \
            libgl1-mesa-dev fontconfig libxml2-utils xsltproc rsync bc cpio
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Install Repo Tool & twrpdtgen
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          pip3 install twrpdtgen

      - name: Initialize TWRP Source Manifest
        run: |
          mkdir twrp && cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-11.0 --depth=1

      - name: Sync Manifest Sources
        run: |
          cd twrp
          repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune -j8

      - name: Download User Components from Pixeldrain
        run: |
          mkdir -p input_images
          echo "Downloading boot.img..."
          curl -L "${{ github.event.inputs.boot_link }}" -o input_images/boot.img
          echo "Downloading vendor_boot.img..."
          curl -L "${{ github.event.inputs.vendor_boot_link }}" -o input_images/vendor_boot.img
          echo "Downloading dtbo.img..."
          curl -L "${{ github.event.inputs.dtbo_link }}" -o input_images/dtbo.img

      - name: Generate Device Tree using twrpdtgen & Inject Payloads
        run: |
          python3 -m twrpdtgen input_images/boot.img -o twrp/device
          
          if [ -d "twrp/device/xiaomi/pipa" ]; then
              DT_PATH="twrp/device/xiaomi/pipa"
          else
              FOUND_PATH=$(find twrp/device -maxdepth 3 -type d -name "*pipa*")
              if [ -n "$FOUND_PATH" ]; then
                  DT_PATH="$FOUND_PATH"
              else
                  DT_PATH="twrp/device/xiaomi/pipa"
                  mkdir -p "$DT_PATH"
              fi
          fi
          
          mkdir -p "$DT_PATH/recovery/root/sbin"
          
          cp PARTITION "$DT_PATH/recovery/root/sbin/partition" 2>/dev/null || true
          cp RESTORE "$DT_PATH/recovery/root/sbin/restore" 2>/dev/null || true
          cp parted "$DT_PATH/recovery/root/sbin/parted" 2>/dev/null || true
          cp mkfs.fat "$DT_PATH/recovery/root/sbin/mkfs.fat" 2>/dev/null || true
          cp mkfs.ntfs "$DT_PATH/recovery/root/sbin/mkfs.ntfs" 2>/dev/null || true
          
          chmod +x "$DT_PATH/recovery/root/sbin/"*

      - name: Start Compilation
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch omni_pipa-userdebug
          mka recoveryimage

      - name: Upload Recovery Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi-Pad-6-Custom-Recovery
          path: twrp/out/target/product/pipa/recovery.img
          
