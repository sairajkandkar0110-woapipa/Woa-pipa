name: Build Modded TWRP (pipa) with WOA tools

on:
  workflow_dispatch:
    inputs:
      boot_img_link:
        description: 'Direct/Pixeldrain link to boot.img'
        required: true
        default: 'https://pixeldrain.com/u/CHANGE_ME'
      device_codename:
        description: 'Device codename'
        required: true
        default: 'pipa'
      device_vendor:
        description: 'Device vendor'
        required: true
        default: 'xiaomi'
      twrp_branch:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build-twrp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (WOA tools + scripts)
        uses: actions/checkout@v4
        with:
          path: woa-tools

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Aggressive extra cleanup
        run: |
          echo "Before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo apt-get clean
          docker system prune -af --volumes 2>/dev/null || true

          echo "After cleanup:"
          df -h

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip wget curl unzip \
            openjdk-8-jdk bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool \
            libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev
          pip3 install twrpdtgen
          sudo apt-get clean

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Download boot.img
        run: |
          LINK="${{ github.event.inputs.boot_img_link }}"
          if [[ "$LINK" == *"pixeldrain.com/u/"* ]]; then
            FILE_ID="${LINK##*/u/}"
            LINK="https://pixeldrain.com/api/file/${FILE_ID}"
          fi
          wget -O boot.img "$LINK"
