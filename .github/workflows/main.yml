name: Build Custom Recovery for Xiaomi Pad 6 (pipa)

on:
  workflow_dispatch:
    inputs:
      boot_link:
        description: 'Pixeldrain Link for boot.img'
        required: true
        type: string
      vendor_boot_link:
        description: 'Pixeldrain Link for vendor_boot.img'
        required: true
        type: string
      dtbo_link:
        description: 'Pixeldrain Link for dtbo.img'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository & Custom Files
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update && sudo apt-get install -y \
            git python3 gperf build-essential zip curl zlib1g-dev libx11-dev \
            libgl1-mesa-dev fontconfig libxml2-utils xsltproc rsync bc cpio file
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Install Repo Tool & twrpdtgen
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          pip3 install twrpdtgen

      - name: Initialize Android Open Source Manifest
        run: |
          mkdir source && cd source
          repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_r1 --depth=1

      - name: Sync Manifest Sources (Full Shallow Sync)
        run: |
          cd source
          # Removed the path filters so the entire build toolchain (Soong/Blueprint) is downloaded
          repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j8

      - name: Download User Components from Pixeldrain
        run: |
          mkdir -p input_images
          
          # Automatically convert Pixeldrain web UI links to raw file API links
          BOOT_URL=$(echo "${{ github.event.inputs.boot_link }}" | sed 's|/u/|/api/file/|g')
          VENDOR_URL=$(echo "${{ github.event.inputs.vendor_boot_link }}" | sed 's|/u/|/api/file/|g')
          DTBO_URL=$(echo "${{ github.event.inputs.dtbo_link }}" | sed 's|/u/|/api/file/|g')
          
          echo "Downloading boot.img..."
          curl -L "$BOOT_URL" -o input_images/boot.img
          
          echo "Downloading vendor_boot.img..."
          curl -L "$VENDOR_URL" -o input_images/vendor_boot.img
          
          echo "Downloading dtbo.img..."
          curl -L "$DTBO_URL" -o input_images/dtbo.img

      - name: Generate Device Tree & Patch for Pure AOSP
        run: |
          python3 -m twrpdtgen input_images/boot.img -o source/device
          
          if [ -d "source/device/xiaomi/pipa" ]; then
              DT_PATH="source/device/xiaomi/pipa"
          else
              FOUND_PATH=$(find source/device -maxdepth 3 -type d -name "*pipa*")
              if [ -n "$FOUND_PATH" ]; then
                  DT_PATH="$FOUND_PATH"
              else
                  DT_PATH="source/device/xiaomi/pipa"
                  mkdir -p "$DT_PATH"
              fi
          fi
          
          # Rename twrpdtgen's omni/twrp prefixes to aosp for pure AOSP building
          mv "$DT_PATH/omni_pipa.mk" "$DT_PATH/aosp_pipa.mk" 2>/dev/null || true
          mv "$DT_PATH/twrp_pipa.mk" "$DT_PATH/aosp_pipa.mk" 2>/dev/null || true
          find "$DT_PATH" -type f -exec sed -i 's/omni_pipa/aosp_pipa/g' {} +
          find "$DT_PATH" -type f -exec sed -i 's/twrp_pipa/aosp_pipa/g' {} +
          
          mkdir -p "$DT_PATH/recovery/root/sbin"
          
          # Inject custom scripts
          cp PARTITION "$DT_PATH/recovery/root/sbin/partition" 2>/dev/null || true
          cp RESTORE "$DT_PATH/recovery/root/sbin/restore" 2>/dev/null || true
          cp parted "$DT_PATH/recovery/root/sbin/parted" 2>/dev/null || true
          cp mkfs.fat "$DT_PATH/recovery/root/sbin/mkfs.fat" 2>/dev/null || true
          cp mkfs.ntfs "$DT_PATH/recovery/root/sbin/mkfs.ntfs" 2>/dev/null || true
          
          chmod +x "$DT_PATH/recovery/root/sbin/"* 2>/dev/null || true

      - name: Start Compilation
        run: |
          cd source
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch aosp_pipa-userdebug
          mka recoveryimage

      - name: Upload Recovery Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi-Pad-6-AOSP-Recovery
          path: source/out/target/product/pipa/recovery.img
          
