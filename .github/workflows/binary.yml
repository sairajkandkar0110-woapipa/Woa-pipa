name: Build Static ARM64 Binaries (Native Cross-Compile)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-arm64-binaries:
    name: Native Cross-Compile ARM64 Binaries
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Create Output Directory
        run: mkdir -p ${{ github.workspace }}/output-binaries

      - name: Patch APT Sources and Install ARM64 Toolchain
        run: |
          echo "Patching Ubuntu sources for multiarch (adding ports.ubuntu.com)..."
          sudo sed -i 's/^deb http/deb [arch=amd64,i386] http/g' /etc/apt/sources.list
          sudo sed -i 's/^deb mirror/deb [arch=amd64,i386] mirror/g' /etc/apt/sources.list
          cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF
          
          echo "Adding ARM64 architecture..."
          sudo dpkg --add-architecture arm64
          sudo apt-get update -y
          
          echo "Installing cross-compilers and ARM64 static libraries..."
          sudo apt-get install -y crossbuild-essential-arm64 uuid-dev:arm64 libpopt-dev:arm64 wget file

      - name: Build ntfs-3g & mkfs.ntfs (Native Speed)
        run: |
          echo "Downloading stable ntfs-3g release..."
          wget https://tuxera.com/opensource/ntfs-3g_ntfsprogs-2022.10.3.tgz
          tar -xf ntfs-3g_ntfsprogs-2022.10.3.tgz
          cd ntfs-3g_ntfsprogs-2022.10.3
          
          echo "Configuring ntfs-3g for cross-compilation..."
          ./configure --host=aarch64-linux-gnu CC=aarch64-linux-gnu-gcc \
                      CFLAGS="-static -O2 -Wno-implicit-function-declaration" LDFLAGS="-static" \
                      --disable-shared --disable-ldconfig
          
          echo "Compiling ntfs-3g (Multi-threaded Native Speed)..."
          make -j$(nproc)
          
          echo "Copying ntfs-3g binaries to output..."
          cp src/ntfs-3g ${{ github.workspace }}/output-binaries/ntfs-3g
          cp mkntfs/mkntfs ${{ github.workspace }}/output-binaries/mkfs.ntfs

      - name: Build sgdisk (Native Speed)
        run: |
          echo "Cloning gptfdisk..."
          git clone https://repo.or.cz/gptfdisk.git
          cd gptfdisk
          
          echo "Compiling sgdisk natively for ARM64..."
          make sgdisk -j$(nproc) CXX=aarch64-linux-gnu-g++ CC=aarch64-linux-gnu-gcc CXXFLAGS="-O2 -static" LDFLAGS="-static"
          
          echo "Copying sgdisk binary to output..."
          cp sgdisk ${{ github.workspace }}/output-binaries/sgdisk

      - name: Verify and Strip Binaries
        run: |
          echo "Verifying binaries are statically linked ARM64 executables..."
          file ${{ github.workspace }}/output-binaries/ntfs-3g
          file ${{ github.workspace }}/output-binaries/mkfs.ntfs
          file ${{ github.workspace }}/output-binaries/sgdisk
          
          echo "Stripping debug symbols..."
          aarch64-linux-gnu-strip ${{ github.workspace }}/output-binaries/ntfs-3g
          aarch64-linux-gnu-strip ${{ github.workspace }}/output-binaries/mkfs.ntfs
          aarch64-linux-gnu-strip ${{ github.workspace }}/output-binaries/sgdisk

      - name: Commit and Push Binaries to Repository Root
        run: |
          echo "Copying binaries to repository root..."
          cp ${{ github.workspace }}/output-binaries/ntfs-3g ${{ github.workspace }}/ntfs-3g
          cp ${{ github.workspace }}/output-binaries/mkfs.ntfs ${{ github.workspace }}/mkfs.ntfs
          cp ${{ github.workspace }}/output-binaries/sgdisk ${{ github.workspace }}/sgdisk
          
          echo "Configuring Git..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          echo "Adding files to git..."
          git add ntfs-3g mkfs.ntfs sgdisk
          
          if git diff --staged --quiet; then
            echo "No changes to commit. Binaries are already up to date."
          else
            echo "Committing new binaries..."
            git commit -m "Auto-compile static ARM64 binaries via cross-compiler"
            git push
          fi

      - name: Generate Release Tag
        id: tag
        run: echo "RELEASE_TAG=arm64-binaries-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Binaries to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ARM64 Static Binaries (ntfs-3g & sgdisk)
          body: |
            Fully static `aarch64` binaries compiled natively via `crossbuild-essential-arm64`.
            Ready to be dropped directly into Android Recovery environments (TWRP/OrangeFox).
            
            **Included files:**
            * `sgdisk` - Command-line GUID partition table manipulator
            * `ntfs-3g` - NTFS read/write driver
            * `mkfs.ntfs` - NTFS formatting utility
          files: |
            ${{ github.workspace }}/output-binaries/ntfs-3g
            ${{ github.workspace }}/output-binaries/mkfs.ntfs
            ${{ github.workspace }}/output-binaries/sgdisk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
