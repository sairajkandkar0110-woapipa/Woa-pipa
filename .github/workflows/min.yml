name: Build Modded OrangeFox (pipa) with WOA tools

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '12.1'
        type: choice
        options:
        - 12.1
        - 14.1
      DEVICE_TREE:
        description: 'OrangeFox Device Tree URL'
        required: true
        default: 'https://github.com/PipaDB/OFRP-device_xiaomi_pipa'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox Device Tree Branch'
        required: true
        default: 'fox_12.1-a16'
      DEVICE_PATH:
        description: 'Specify your Device Path'
        required: true
        default: 'device/xiaomi/pipa'
      DEVICE_NAME:
        description: 'Specify your Device Codename'
        required: true
        default: 'pipa'
      BUILD_TARGET:
        description: 'Specify your Build Target (pipa uses boot)'
        required: true
        default: 'boot'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot

permissions:
  contents: write

jobs:
  build:
    name: Build OrangeFox by ${{ github.actor }}
    runs-on: ubuntu-22.04
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: '8192'
        swap-size-mb: '1024'
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Aggressive extra cleanup
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                    /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                    "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
        sudo apt-get clean
        docker system prune -af --volumes 2>/dev/null || true

    - name: Checkout Custom WOA Tools
      uses: actions/checkout@v4
      with:
        path: woa-tools

    - name: Build Environment & ZRAM Setup
      run: |
        sudo apt-get update
        sudo apt install aria2 linux-modules-extra-$(uname -r) zram-tools -y
        
        echo "Setting up ZRAM..."
        sudo modprobe zram
        sudo sed -i 's/^#PERCENT=50/PERCENT=90/' /etc/default/zramswap || true
        sudo sed -i 's/^#PRIORITY=100/PRIORITY=1000/' /etc/default/zramswap || true
        sudo systemctl restart zramswap || true
        zramctl
        
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh
        cd .. && rm -rf scripts
        sudo apt autoclean >/dev/null || true

    - name: Set-up OrangeFox Manifest (Shallow Sync)
      run: |
        MANIFEST_BRANCH="${{ inputs.MANIFEST_BRANCH }}"
        MANIFEST_BRANCH=${MANIFEST_BRANCH:-12.1}
        
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        
        git clone https://gitlab.com/OrangeFox/sync.git -b master
        cd sync
        ./orangefox_sync.sh --branch $MANIFEST_BRANCH --path ${GITHUB_WORKSPACE}/OrangeFox/fox_$MANIFEST_BRANCH

    - name: Clone PipaDB Device Tree
      run: |
        MANIFEST_BRANCH="${{ inputs.MANIFEST_BRANCH }}"
        MANIFEST_BRANCH=${MANIFEST_BRANCH:-12.1}
        DEVICE_TREE="${{ inputs.DEVICE_TREE }}"
        DEVICE_TREE=${DEVICE_TREE:-https://github.com/PipaDB/OFRP-device_xiaomi_pipa}
        DEVICE_TREE_BRANCH="${{ inputs.DEVICE_TREE_BRANCH }}"
        DEVICE_TREE_BRANCH=${DEVICE_TREE_BRANCH:-fox_12.1-a16}
        DEVICE_PATH="${{ inputs.DEVICE_PATH }}"
        DEVICE_PATH=${DEVICE_PATH:-device/xiaomi/pipa}
        
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_$MANIFEST_BRANCH
        git clone $DEVICE_TREE -b $DEVICE_TREE_BRANCH ./$DEVICE_PATH
        cd $DEVICE_PATH
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Inject Custom ArKT C++ Source Modifications
      run: |
        MANIFEST_BRANCH="${{ inputs.MANIFEST_BRANCH }}"
        MANIFEST_BRANCH=${MANIFEST_BRANCH:-12.1}
        
        echo "Replacing OrangeFox source files with custom ArKT WOA modifications..."
        
        OF_RECOVERY_PATH="${GITHUB_WORKSPACE}/OrangeFox/fox_$MANIFEST_BRANCH/bootable/recovery"
        
        cp -f woa-tools/twrp-source-mods/variables.h $OF_RECOVERY_PATH/variables.h 2>/dev/null || true
        cp -f woa-tools/twrp-source-mods/data.cpp $OF_RECOVERY_PATH/data.cpp 2>/dev/null || true
        cp -f woa-tools/twrp-source-mods/twrp-functions.cpp $OF_RECOVERY_PATH/twrp-functions.cpp 2>/dev/null || true
        cp -f woa-tools/twrp-source-mods/twrp-functions.hpp $OF_RECOVERY_PATH/twrp-functions.hpp 2>/dev/null || true
        cp -f woa-tools/twrp-source-mods/twrp.cpp $OF_RECOVERY_PATH/twrp.cpp 2>/dev/null || true
        cp -f woa-tools/twrp-source-mods/actions.cpp $OF_RECOVERY_PATH/gui/actions.cpp 2>/dev/null || true
        
        echo "Injection complete."
        
    - name: Inject WOA Formatting Binaries into Recovery Root
      run: |
        MANIFEST_BRANCH="${{ inputs.MANIFEST_BRANCH }}"
        MANIFEST_BRANCH=${MANIFEST_BRANCH:-12.1}
        DEVICE_PATH="${{ inputs.DEVICE_PATH }}"
        DEVICE_PATH=${DEVICE_PATH:-device/xiaomi/pipa}
        
        SBIN_PATH="${GITHUB_WORKSPACE}/OrangeFox/fox_$MANIFEST_BRANCH/$DEVICE_PATH/recovery/root/sbin"
        mkdir -p "$SBIN_PATH"

        cp woa-tools/parted "$SBIN_PATH/parted" 2>/dev/null || true
        cp woa-tools/mkfs.fat "$SBIN_PATH/mkfs.fat" 2>/dev/null || true
        cp woa-tools/mkfs.ntfs "$SBIN_PATH/mkfs.ntfs" 2>/dev/null || true
        cp woa-tools/ntfs-3g "$SBIN_PATH/ntfs-3g" 2>/dev/null || true
        cp woa-tools/sgdisk "$SBIN_PATH/sgdisk" 2>/dev/null || true
        cp woa-tools/PARTITION "$SBIN_PATH/partition" 2>/dev/null || true
        cp woa-tools/RESTORE "$SBIN_PATH/restore" 2>/dev/null || true

        chmod 755 "$SBIN_PATH/parted" "$SBIN_PATH/mkfs.fat" "$SBIN_PATH/mkfs.ntfs" \
                  "$SBIN_PATH/ntfs-3g" "$SBIN_PATH/sgdisk" \
                  "$SBIN_PATH/partition" "$SBIN_PATH/restore" 2>/dev/null || true

    - name: Building OrangeFox
      run: |
        MANIFEST_BRANCH="${{ inputs.MANIFEST_BRANCH }}"
        MANIFEST_BRANCH=${MANIFEST_BRANCH:-12.1}
        DEVICE_NAME="${{ inputs.DEVICE_NAME }}"
        DEVICE_NAME=${DEVICE_NAME:-pipa}
        BUILD_TARGET="${{ inputs.BUILD_TARGET }}"
        BUILD_TARGET=${BUILD_TARGET:-boot}
        
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_$MANIFEST_BRANCH
        set +e
        export FOX_BUILD_DEVICE=$DEVICE_NAME
        
        export USE_CCACHE=1
        export CCACHE_DIR=$(pwd)/.ccache
        mkdir -p $CCACHE_DIR
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 5G
        
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        
        lunch twrp_${DEVICE_NAME}-eng
        make clean
        mka adbd ${BUILD_TARGET}image

    - name: Set Release Properties
      run: |
        DEVICE_TREE="${{ inputs.DEVICE_TREE }}"
        DEVICE_TREE=${DEVICE_TREE:-https://github.com/PipaDB/OFRP-device_xiaomi_pipa}
        
        echo "BUILD_DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
        DEVICE_TREE_URL="$DEVICE_TREE"
        if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
          DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
        fi
        echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

    - name: Upload to Release
      uses: softprops/action-gh-release@master
      with:
        files: |
          OrangeFox/fox_*/out/target/product/*/OrangeFox*.img
          OrangeFox/fox_*/out/target/product/*/OrangeFox*.zip
        name: Modded OrangeFox WOA - pipa // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          ## OrangeFox Recovery Build - WOA Modded
          Device Tree: [PipaDB Repository](${{ env.DEVICE_TREE_URL }})
          Commit: [${{ env.COMMIT_ID }}](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }})
          
          **Included ArKT WOA Modifications:**
          * Embedded custom static ARM64 binaries (`ntfs-3g`, `sgdisk`, `mkfs.ntfs`, `mkfs.fat`, `parted`).
          * Custom C++ logic for Windows / ESP partition deployments.
          * Forced Screen timeout disabled.
          * Mass Storage UFS mode interface.
          
